# BLOCK 1: Catch HTTP (port 80 internally mapped from host 7080) and redirect
server {
    listen 80;
    server_name _;
    
    # Redirect all HTTP traffic to HTTPS on port 7443
    return 301 https://$host:7443$request_uri;
}

# BLOCK 2: Handle HTTPS (port 443 internally mapped from host 7443)
server {
    listen 443 ssl;
    server_name _;

    # Point to the SSL certificates mounted via docker-compose
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    
    # Recommended SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 1. Serve the Frontend
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy for the REST API Backend
    location /api/v1/ {
        proxy_pass http://backend:7880;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Proxy for Git Smart HTTP (Push/Pull code)
    location ~ ^/[a-zA-Z0-9_-]+/[a-zA-Z0-9_-]+\.git/ {
        proxy_pass http://backend:7880;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 500M;
    }
}