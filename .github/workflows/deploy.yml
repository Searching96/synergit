name: Synergit CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  # Stage 1: CI - Verify code compilation
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Check Backend Compilation
        run: |
          cd backend
          go mod tidy
          go build -o /dev/null cmd/server/main.go

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Frontend Compilation
        run: |
          cd frontend
          npm install
          # Run a test build to ensure no syntax or TypeScript errors
          VITE_API_BASE_URL=/api/v1 npm run build

  # Stage 2: CD - Automated Deployment to VPS
  continuous-deployment:
    runs-on: ubuntu-latest
    needs: continuous-integration # Only run if the CI stage above succeeds
    steps:
      - name: Executing Remote SSH Commands to Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # Navigate to the project directory on the VPS
            cd ~/synergit
            
            # Pull the latest code from GitHub (Uses the previously configured Deploy Key)
            git pull origin main
            
            # Instruct Docker Compose to rebuild updated containers
            docker compose up -d --build

            docker image prune -f --filter "label=com.docker.compose.project=synergit"