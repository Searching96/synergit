name: synergit-dev

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  migrate:
    image: migrate/migrate:v4.18.3
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?sslmode=disable",
        "up"
      ]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: ./backend
    image: ${IMAGE_REGISTRY:-synergit}/backend:${IMAGE_TAG:-dev}
    environment:
      PORT: ${DEV_BACKEND_PORT:-28080}
      HOST: 0.0.0.0
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?sslmode=disable
      GIT_ROOT: /var/synergit-data
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://127.0.0.1:${DEV_FRONTEND_PORT:-25173}}
      FRONTEND_URLS: ${FRONTEND_URLS:-http://127.0.0.1:${DEV_FRONTEND_PORT:-25173},http://localhost:${DEV_FRONTEND_PORT:-25173}}
      GIT_BASE_URL: ${GIT_BASE_URL:-http://127.0.0.1:${DEV_BACKEND_PORT:-28080}}
    volumes:
      - gitdata:/var/synergit-data
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${DEV_BACKEND_PORT:-28080}:${DEV_BACKEND_PORT:-28080}"
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_DEV_IMAGE:-node:20-alpine}
    working_dir: /app
    environment:
      VITE_API_BASE_URL: ${DEV_API_BASE_URL:-http://127.0.0.1:${DEV_BACKEND_PORT:-28080}/api/v1}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port ${DEV_FRONTEND_PORT:-25173}"
    ports:
      - "127.0.0.1:${DEV_FRONTEND_PORT:-25173}:${DEV_FRONTEND_PORT:-25173}"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  gitdata:
  frontend_node_modules:
