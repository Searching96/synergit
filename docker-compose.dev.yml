name: synergit-dev

services:
  backend:
    environment:
      PORT: ${DEV_BACKEND_PORT:-28080}
      HOST: 0.0.0.0
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?sslmode=disable
      GIT_ROOT: /var/synergit-data
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${DEV_FRONTEND_URL:-http://127.0.0.1:${DEV_FRONTEND_PORT:-25173}}
      GIT_BASE_URL: ${DEV_GIT_BASE_URL:-http://127.0.0.1:${DEV_BACKEND_PORT:-28080}}
    ports:
      - "127.0.0.1:${DEV_BACKEND_PORT:-28080}:${DEV_BACKEND_PORT:-28080}"

  frontend-dev:
    image: node:20-alpine
    working_dir: /app
    environment:
      VITE_API_BASE_URL: ${DEV_API_BASE_URL:-http://127.0.0.1:${DEV_BACKEND_PORT:-28080}/api/v1}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port ${DEV_FRONTEND_PORT:-25173}"
    ports:
      - "127.0.0.1:${DEV_FRONTEND_PORT:-25173}:${DEV_FRONTEND_PORT:-25173}"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  frontend_node_modules:
